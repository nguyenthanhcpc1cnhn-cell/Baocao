<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống Quản trị OKR – KPI – Báo cáo công việc | Phòng Kế toán</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --c-bg:#f5f6f7; --c-surface:#ffffff; --c-shell:#354a5f; --c-shell-dark:#2b3e50;
  --c-primary:#0a6ed1; --c-primary-d:#085caf; --c-text:#32363a; --c-text2:#6a6d70;
  --c-border:#e4e4e4; --c-line:#ededed;
  --c-green:#107e3e; --c-green-bg:#ebf5eb; --c-amber:#e9730c; --c-amber-bg:#fef7f0;
  --c-red:#bb0000; --c-red-bg:#ffebeb; --c-blue-bg:#e8f0fa; --c-grey-bg:#f4f4f5;
  --radius:8px; --shadow:0 1px 4px rgba(0,0,0,.08); --shadow-lg:0 4px 16px rgba(0,0,0,.12);
  --font:"Segoe UI","Helvetica Neue",Arial,sans-serif;
  /* ---- accent palette (thêm màu) ---- */
  --c-indigo:#5b4ddb; --c-teal:#0a8f9c; --c-violet:#7c3aed; --c-pink:#d6336c;
  --c-cyan:#1098ad; --c-orange:#e8590c; --c-lime:#5c940d;
  --grad-brand:linear-gradient(135deg,#0a6ed1 0%,#5b4ddb 55%,#7c3aed 100%);
  --grad-shell:linear-gradient(90deg,#2b3e50 0%,#34405f 60%,#3d3a66 100%);
  --grad-auth:linear-gradient(150deg,#0a6ed1 0%,#4f46e5 45%,#7c3aed 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--c-bg);color:var(--c-text);font-size:14px;line-height:1.45}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--c-primary);text-decoration:none}
.hidden{display:none!important}

/* ===== LAYOUT: navy sidebar + white topbar (theo mẫu) ===== */
#layout{display:flex;min-height:100vh}
#sidebar{width:248px;background:linear-gradient(180deg,#10213b 0%,#13284a 100%);color:#cdd8ea;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
#sidebar .sb-logo{display:flex;align-items:center;gap:11px;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
#sidebar .sb-logo .mk{width:38px;height:38px;border-radius:10px;background:var(--grad-brand);display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff;flex-shrink:0}
#sidebar .sb-logo .tx{font-weight:700;font-size:14px;color:#fff;line-height:1.25}
#sidebar .sb-logo .tx span{display:block;font-size:11px;font-weight:500;color:#8aa0c2}
#sidebar .sb-nav{flex:1;padding:12px 12px;overflow-y:auto}
#sidebar .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;color:#9fb2cf;font-size:13.5px;cursor:pointer;border-radius:9px;margin-bottom:3px;position:relative}
#sidebar .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
#sidebar .nav-item.active{background:var(--grad-brand);color:#fff;font-weight:600;box-shadow:0 4px 12px rgba(91,77,219,.35)}
#sidebar .nav-item .ic{width:20px;text-align:center;font-size:16px;flex-shrink:0}
#sidebar .nav-item .dot{position:absolute;right:12px;width:8px;height:8px;border-radius:50%;background:#ff5c5c}
#sidebar .nav-sep{height:1px;background:rgba(255,255,255,.08);margin:10px 14px}
#sidebar .sb-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
#sidebar .sb-user .av{width:38px;height:38px;border-radius:50%;background:var(--grad-brand);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;flex-shrink:0}
#sidebar .sb-user .nm{font-size:13px;font-weight:600;color:#fff;line-height:1.2}
#sidebar .sb-user .rl{font-size:11px;color:#8aa0c2}
#sidebar .sb-user .st{width:9px;height:9px;border-radius:50%;background:#3ad29f;margin-left:auto}

#wrap{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{height:62px;background:#fff;border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:40}
#topbar .ham{font-size:20px;color:var(--c-text2);cursor:pointer;background:none;border:none}
#topbar .search{flex:1;max-width:420px;position:relative}
#topbar .search input{width:100%;height:40px;border:1px solid var(--c-border);border-radius:21px;padding:0 16px 0 40px;background:var(--c-grey-bg);font-size:13.5px}
#topbar .search input:focus{background:#fff;border-color:var(--c-primary);outline:none}
#topbar .search .si{position:absolute;left:15px;top:11px;color:var(--c-text2)}
#topbar .period-box{display:flex;align-items:center;gap:7px;background:var(--c-blue-bg);color:var(--c-primary);padding:8px 12px;border-radius:9px;font-size:12.5px;font-weight:600;margin-left:auto}
#topbar .period-box select{background:transparent;border:none;color:var(--c-primary);font-weight:700;outline:none}
#topbar .tb-ic{position:relative;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--c-text2);cursor:pointer;font-size:17px}
#topbar .tb-ic:hover{background:var(--c-grey-bg)}
#topbar .tb-ic .badge-dot{position:absolute;top:6px;right:7px;min-width:16px;height:16px;border-radius:8px;background:#ff5c5c;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}
#topbar .tb-user{display:flex;align-items:center;gap:9px;padding:5px 8px 5px 5px;border-radius:24px;cursor:pointer}
#topbar .tb-user:hover{background:var(--c-grey-bg)}
#topbar .tb-user .av{width:34px;height:34px;border-radius:50%;background:var(--grad-brand);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
#topbar .tb-user .nm{font-size:13px;font-weight:600;line-height:1.15}
#topbar .tb-user .rl{font-size:11px;color:var(--c-text2)}
#main{flex:1;padding:24px 28px;overflow-x:hidden;max-width:100%}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.page-head h1{font-size:21px;font-weight:600;color:var(--c-text)}
.page-head .sub{color:var(--c-text2);font-size:13px;margin-top:3px}

.btn{border:1px solid var(--c-primary);background:var(--c-primary);color:#fff;padding:8px 16px;border-radius:6px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--c-primary-d)}
.btn.ghost{background:#fff;color:var(--c-primary)}
.btn.ghost:hover{background:var(--c-blue-bg)}
.btn.neutral{background:#fff;color:var(--c-text);border-color:var(--c-border)}
.btn.neutral:hover{background:var(--c-grey-bg)}
.btn.danger{background:#fff;color:var(--c-red);border-color:#e8b0b0}
.btn.danger:hover{background:var(--c-red-bg)}
.btn.sm{padding:5px 11px;font-size:12.5px}
.btn:disabled{opacity:.5;cursor:not-allowed}

.card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card .card-h{padding:14px 18px;border-bottom:1px solid var(--c-line);font-weight:600;font-size:14.5px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.card .card-b{padding:18px}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.kpi-tile{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi-tile .k-label{font-size:12.5px;color:var(--c-text2);font-weight:500}
.kpi-tile .k-val{font-size:27px;font-weight:700;margin-top:6px;line-height:1}
.kpi-tile .k-sub{font-size:12px;color:var(--c-text2);margin-top:5px}
.kpi-tile .k-bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.kpi-tile.b-blue .k-bar{background:var(--c-primary)} .kpi-tile.b-green .k-bar{background:var(--c-green)}
.kpi-tile.b-amber .k-bar{background:var(--c-amber)} .kpi-tile.b-red .k-bar{background:var(--c-red)}

table.grid{width:100%;border-collapse:collapse;font-size:13px}
table.grid th{text-align:left;padding:10px 12px;background:var(--c-grey-bg);color:var(--c-text2);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--c-border);white-space:nowrap}
table.grid td{padding:10px 12px;border-bottom:1px solid var(--c-line);vertical-align:middle}
table.grid tr:hover td{background:#fafbfc}
table.grid .num{text-align:right;font-variant-numeric:tabular-nums}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:11.5px;font-weight:600;white-space:nowrap}
.badge.g{background:var(--c-green-bg);color:var(--c-green)} .badge.a{background:var(--c-amber-bg);color:var(--c-amber)}
.badge.r{background:var(--c-red-bg);color:var(--c-red)} .badge.b{background:var(--c-blue-bg);color:var(--c-primary)}
.badge.n{background:var(--c-grey-bg);color:var(--c-text2)}

.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--c-text2);margin-bottom:5px}
.field label .req{color:var(--c-red)}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;border:1px solid var(--c-border);border-radius:6px;background:#fff;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--c-primary);box-shadow:0 0 0 2px rgba(10,110,209,.12)}
.field textarea{resize:vertical;min-height:62px}
.field .hint{font-size:11.5px;color:var(--c-text2);margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 18px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 18px}

.tabs{display:flex;gap:2px;border-bottom:1px solid var(--c-border);margin-bottom:18px;flex-wrap:wrap}
.tabs .tab{padding:10px 16px;font-size:13.5px;color:var(--c-text2);cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
.tabs .tab:hover{color:var(--c-text)}
.tabs .tab.active{color:var(--c-primary);border-bottom-color:var(--c-primary);font-weight:600}

.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:7px 11px;border:1px solid var(--c-border);border-radius:6px;background:#fff}
.toolbar .grow{flex:1}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:36px 16px;overflow-y:auto}
#modal{background:#fff;border-radius:10px;box-shadow:var(--shadow-lg);width:100%;max-width:920px;animation:pop .18s ease}
@keyframes pop{from{transform:translateY(10px) scale(.99);opacity:0}to{transform:none;opacity:1}}
#modal .m-head{padding:16px 22px;border-bottom:1px solid var(--c-line);display:flex;align-items:center;justify-content:space-between}
#modal .m-head h3{font-size:17px;font-weight:600}
#modal .m-head .x{background:none;border:none;font-size:22px;color:var(--c-text2);line-height:1}
#modal .m-body{padding:20px 22px;max-height:70vh;overflow-y:auto}
#modal .m-foot{padding:14px 22px;border-top:1px solid var(--c-line);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}

#toast-wrap{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:#32363a;color:#fff;padding:12px 18px;border-radius:8px;box-shadow:var(--shadow-lg);font-size:13.5px;display:flex;align-items:center;gap:10px;animation:slidein .25s ease;max-width:360px}
.toast.ok{background:var(--c-green)} .toast.err{background:var(--c-red)} .toast.warn{background:var(--c-amber)}
@keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

.empty{text-align:center;padding:46px 20px;color:var(--c-text2)}
.empty .e-ic{font-size:38px;opacity:.4;margin-bottom:10px}
.chart-wrap{position:relative;height:280px}
.row-flex{display:flex;gap:18px;flex-wrap:wrap}
.row-flex>*{flex:1;min-width:300px}
.metric-row{display:grid;grid-template-columns:1.4fr 1fr;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--c-line)}
.metric-row .m-name{font-size:13px}
.metric-row .m-name small{display:block;color:var(--c-text2);font-size:11px}
.metric-row .tag{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--c-blue-bg);color:var(--c-primary);margin-left:6px}
.progress{height:8px;background:var(--c-line);border-radius:5px;overflow:hidden}
.progress>div{height:100%;background:var(--c-primary)}
.kpi-ring{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-weight:700}
.kpi-ring .r-num{font-size:26px;line-height:1} .kpi-ring .r-lbl{font-size:10px;font-weight:500;opacity:.9}
.ai-msg{background:var(--c-grey-bg);border-radius:8px;padding:14px 16px;margin-bottom:12px;font-size:13.5px;white-space:pre-wrap;line-height:1.6}
.ai-msg.u{background:var(--c-blue-bg)}
/* ===== COLOR ACCENTS on shell & nav ===== */
#shell-bar{background:var(--grad-shell)}
#shell-bar .logo{display:flex;align-items:center;gap:8px}
#shell-bar .logo .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#43d9ad,#0a6ed1);box-shadow:0 0 0 3px rgba(255,255,255,.12)}
#nav .nav-item.active{background:linear-gradient(90deg,var(--c-blue-bg),#fff);border-left-color:var(--c-primary)}
#nav .nav-item .ic{color:var(--c-primary)}
.page-head h1{background:var(--grad-brand);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.card .card-h{border-bottom:2px solid transparent;border-image:var(--grad-brand) 1;background:linear-gradient(180deg,#fbfcff,#fff)}

/* ===== NEW LOGIN (chuyên nghiệp + màu) ===== */
.auth{min-height:100vh;display:flex;align-items:stretch}
.auth-brand{flex:1.05;background:var(--grad-auth);color:#fff;padding:54px 50px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-brand::before{content:"";position:absolute;width:520px;height:520px;border-radius:50%;background:rgba(255,255,255,.08);top:-180px;right:-160px}
.auth-brand::after{content:"";position:absolute;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.07);bottom:-120px;left:-90px}
.auth-brand .b-logo{display:flex;align-items:center;gap:11px;font-weight:700;font-size:18px;letter-spacing:.4px;position:relative;z-index:1}
.auth-brand .b-logo .mk{width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.18);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;font-size:21px;border:1px solid rgba(255,255,255,.25)}
.auth-brand .b-mid{position:relative;z-index:1;max-width:440px}
.auth-brand .b-mid h1{font-size:33px;line-height:1.18;font-weight:700;margin-bottom:16px}
.auth-brand .b-mid p{font-size:14.5px;opacity:.92;line-height:1.65;margin-bottom:26px}
.auth-brand .b-feats{display:grid;gap:13px}
.auth-brand .b-feats .f{display:flex;align-items:center;gap:11px;font-size:13.5px}
.auth-brand .b-feats .f .fi{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.auth-brand .b-foot{position:relative;z-index:1;font-size:12px;opacity:.72}
.auth-form{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 32px;background:var(--c-bg)}
.auth-card{width:100%;max-width:410px}
.auth-card .ac-h{font-size:24px;font-weight:700;margin-bottom:5px}
.auth-card .ac-s{color:var(--c-text2);font-size:13.5px;margin-bottom:26px}
.auth-card .field label{font-size:13px}
.auth-card select{height:46px;border-radius:10px;font-weight:500}
.auth-card .ac-btn{width:100%;height:48px;justify-content:center;font-size:15px;border-radius:10px;background:var(--grad-brand);border:none;box-shadow:0 6px 18px rgba(91,77,219,.32);margin-top:6px}
.auth-card .ac-btn:hover{filter:brightness(1.06)}
.role-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:16px 0 6px}
.role-cards .rc{border:1.5px solid var(--c-border);border-radius:10px;padding:11px 8px;text-align:center;cursor:pointer;transition:.15s;background:#fff}
.role-cards .rc:hover{border-color:var(--c-primary);background:var(--c-blue-bg)}
.role-cards .rc.on{border-color:var(--c-primary);background:var(--c-blue-bg);box-shadow:0 0 0 3px rgba(10,110,209,.12)}
.role-cards .rc .ic{font-size:20px;margin-bottom:4px}
.role-cards .rc .nm{font-size:12px;font-weight:600}
.role-cards .rc .ct{font-size:10.5px;color:var(--c-text2);margin-top:2px}
.role-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.role-pill.employee{background:var(--c-blue-bg);color:var(--c-primary)}
.role-pill.manager{background:#efe9ff;color:var(--c-violet)}
.role-pill.admin{background:#ffeef3;color:var(--c-pink)}

/* login form extras (mockup) */
.auth-brand .sky{position:absolute;left:0;right:0;bottom:0;width:100%;opacity:.5;z-index:0}
.in-ic{position:relative}
.in-ic input{padding-right:40px}
.in-ic .ic{position:absolute;right:13px;top:12px;color:var(--c-text2);font-size:15px;cursor:pointer}
.auth-card input[type=text],.auth-card input[type=password]{height:46px;border-radius:10px}
.ac-row{display:flex;align-items:center;justify-content:space-between;margin:4px 0 18px;font-size:13px}
.ac-row label{display:inline-flex;align-items:center;gap:7px;color:var(--c-text2);cursor:pointer}
.ac-row a{font-weight:600;cursor:pointer}
.ac-or{text-align:center;color:var(--c-text2);font-size:12.5px;margin:18px 0;position:relative}
.ac-or::before,.ac-or::after{content:"";position:absolute;top:50%;width:38%;height:1px;background:var(--c-border)}
.ac-or::before{left:0}.ac-or::after{right:0}
.social{display:flex;gap:12px}
.social button{flex:1;height:46px;border:1px solid var(--c-border);background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:13.5px;color:var(--c-text)}
.social button:hover{background:var(--c-grey-bg)}
.ac-foot{text-align:center;margin-top:20px;font-size:13px;color:var(--c-text2)}
.ac-foot a{font-weight:600;cursor:pointer}
.demo-pick{margin-top:16px;padding:11px 12px;background:var(--c-blue-bg);border-radius:10px;font-size:12px}
.demo-pick .t{font-weight:700;color:var(--c-primary);margin-bottom:6px}
.demo-pick .chips{display:flex;flex-wrap:wrap;gap:6px}
.demo-pick .chips button{border:1px solid #b9d3ef;background:#fff;color:var(--c-primary);border-radius:14px;padding:3px 10px;font-size:11.5px;font-weight:600}
.demo-pick .chips button:hover{background:#fff;box-shadow:0 0 0 2px rgba(10,110,209,.15)}

/* ===== group color chips ===== */
.g-chip{display:inline-flex;align-items:center;gap:6px;padding:3px 11px;border-radius:14px;font-size:12px;font-weight:700;color:#fff}
.g-CTTT{background:var(--c-primary)} .g-HDCN{background:var(--c-teal)} .g-THUE{background:var(--c-orange)}
.g-KTTH{background:var(--c-indigo)} .g-LAIVAY{background:var(--c-pink)} .g-BCTC{background:var(--c-violet)} .g-KHAC{background:var(--c-lime)}
.grp-band td{background:linear-gradient(90deg,rgba(10,110,209,.06),transparent)!important;font-size:13.5px}

/* ===== metric builder (khai báo công việc) ===== */
.mb-row{display:grid;grid-template-columns:1.3fr 1.7fr .9fr .8fr 1fr auto;gap:8px;align-items:center;padding:8px;border:1px solid var(--c-line);border-radius:8px;margin-bottom:7px;background:#fbfcfe}
.mb-row input,.mb-row select{padding:6px 8px;font-size:12.5px;border:1px solid var(--c-border);border-radius:6px;width:100%}
.mb-row .flags{display:flex;gap:7px;flex-wrap:wrap;font-size:11px;grid-column:1/-1;padding-top:2px;color:var(--c-text2)}
.mb-row .flags label{display:inline-flex;align-items:center;gap:3px;font-weight:600}
.mb-row .rm{background:var(--c-red-bg);color:var(--c-red);border:1px solid #e8b0b0;border-radius:6px;width:30px;height:30px;font-size:16px;line-height:1}

"use strict";

// kpiRole: gắn nhãn để KPI engine đọc đúng bản chất nghiệp vụ
//  vplan/vactual = khối lượng; valplan/valactual = giá trị/quy mô

// m(code,name,type,unit,{req,plan,act,kpi,ai,role})

  return {code,name,type,unit:unit||'',req:!!o.req,plan:!!o.plan,act:o.act!==false,

const AC=(c,n,t,role,unit,req)=>m(c,n,t,unit||'',{act:true,kpi:!!role,req:!!req,role:role||null});   // chỉ tiêu THỰC HIỆN
function finishTpl(arr){
  const roles=new Set(arr.map(x=>x.role).filter(Boolean));
  if(!roles.has('due_date')) arr.push(m('due_date','Hạn hoàn thành',T.DATE,'',{plan:true,act:false,role:'due_date'}));
  if(!roles.has('ontime_date')) arr.push(m('done_date','Ngày hoàn thành thực tế',T.DATE,'',{role:'ontime_date'}));
  if(!roles.has('completion')) arr.push(m('completion','% hoàn thành',T.PCT,'%',{req:true,role:'completion'}));
  arr.push(m('note','Ghi chú / diễn giải',T.TEXT,'',{ai:false}));
  return arr;
}

function buildWorkCatalog(){
  const out=[];
  WORK_GROUPS.forEach(g=>{
    const jobs=REAL_JOBS[g.name]||[];
    jobs.forEach((job,i)=>{
      const arch=JOB_ARCHETYPE[job]||'phat_sinh';
      const metrics=ARCHETYPES[arch]().map(mm=>({...mm}));   // bản sao riêng cho từng đầu việc
      out.push({code:g.code+'-'+String(i+1).padStart(2,'0'),group:g.code,name:job,archetype:arch,
        archetypeLabel:ARCHETYPE_LABEL[arch]||arch,nature:'Định kỳ',
        cycle:g.code==='BCTC'?'Tháng/Quý/Năm':'Tháng',evidence:true,metrics});
    });
  });
  return out;
}

/* ================== INDEXEDDB LAYER ================== */
const DB_NAME='ketoan_okr_kpi', DB_VER=2;
const SEED_VERSION=6; // tăng số này mỗi khi đổi dữ liệu/mô hình để tự nạp lại
const STORES=['branches','employees','accounts','work_groups','work_catalog',
  'okr_headers','okr_lines','okr_line_actuals','okr_metrics','assigned_tasks',
  'approvals','kpi_results','attachments','audit_log','periods','meta'];
let _db=null;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{const db=e.target.result; const utx=e.target.transaction;
    const ensureIx=(os,name,key)=>{ if(!os.indexNames.contains(name)) os.createIndex(name,key); };
    STORES.forEach(s=>{
      let os;
      if(!db.objectStoreNames.contains(s)){
        const ks=(s==='meta')?'k':'id'; os=db.createObjectStore(s,{keyPath:ks});
      } else { os=utx.objectStore(s); }
      if(s==='okr_lines')ensureIx(os,'okr','okrId');
      if(s==='okr_line_actuals')ensureIx(os,'line','lineId');
      if(s==='okr_metrics')ensureIx(os,'line','lineId');
      if(s==='okr_headers'){ensureIx(os,'emp','empCode');ensureIx(os,'period','periodId');}
      if(s==='kpi_results'){ensureIx(os,'emp','empCode');ensureIx(os,'period','periodId');}
      if(s==='assigned_tasks')ensureIx(os,'emp','empCode');
      if(s==='audit_log')ensureIx(os,'obj','objectId');
    });
  };
  r.onsuccess=e=>{_db=e.target.result;res(_db)};
  r.onerror=e=>rej(e.target.error);
});}
function tx(store,mode='readonly'){return _db.transaction(store,mode).objectStore(store);}
function dbGet(store,key){return new Promise((res,rej)=>{const r=tx(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbAll(store){return new Promise((res,rej)=>{const r=tx(store).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function dbPut(store,val){return new Promise((res,rej)=>{const r=tx(store,'readwrite').put(val);r.onsuccess=()=>res(val);r.onerror=()=>rej(r.error);});}
function dbDel(store,key){return new Promise((res,rej)=>{const r=tx(store,'readwrite').delete(key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function dbClear(store){return new Promise((res,rej)=>{const r=tx(store,'readwrite').clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function dbIndex(store,idx,val){return new Promise((res,rej)=>{const r=tx(store).index(idx).getAll(val);r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}

const uid=p=>(p||'id')+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);

async function seedIfEmpty(){
  const sv=await dbGet('meta','seedVersion');
  const prev=sv?sv.v:0;
  if(prev===SEED_VERSION){ await ensurePeriods(); return; }   // vẫn đảm bảo kỳ realtime mỗi lần mở
  // Chỉ THÊM bản ghi còn thiếu — KHÔNG xóa/ghi đè dữ liệu người dùng đã tạo (tài khoản, nhân viên...)
  const addIfMissing=async(store,key,val)=>{ let ex=null; try{ex=await dbGet(store,key);}catch(e){} if(!ex) await dbPut(store,val); };
  for(const b of SEED_BRANCHES) await addIfMissing('branches',b.code,{id:b.code,...b});
  for(const e of SEED_EMPLOYEES) await addIfMissing('employees',e.code,{id:e.code,...e});
  for(const a of SEED_ACCOUNTS) await addIfMissing('accounts',a.user,{id:a.user,...a});
  for(const g of WORK_GROUPS) await dbPut('work_groups',{id:g.code,...g});  // nhóm: dữ liệu tham chiếu, cập nhật an toàn
  // Danh mục công việc: cập nhật mẫu chỉ tiêu mới, nhưng GIỮ NGUYÊN việc đã được người dùng chỉnh/thêm
  for(const w of WORK_CATALOG){ let ex=null; try{ex=await dbGet('work_catalog',w.code);}catch(e){}
    if(!ex || !ex.userEdited) await dbPut('work_catalog',{id:w.code,...w}); }
  // v6: XÓA TOÀN BỘ dữ liệu KPI/OKR demo (một lần) — hệ thống bắt đầu sạch, không seed demo nữa
  if(prev<6){
    for(const s of ['okr_headers','okr_lines','okr_line_actuals','okr_metrics','kpi_results','assigned_tasks','approvals']) await dbClear(s);
    const logs=await dbAll('audit_log');
    for(const lg of logs){ if(lg.objectId==='demo'||['okr','actual','okr_line','kpi'].includes(lg.objectType)) await dbDel('audit_log',lg.id); }
  }
  await ensurePeriods();
  await dbPut('meta',{k:'seeded',v:true});
  await dbPut('meta',{k:'seedVersion',v:SEED_VERSION});
  await dbPut('meta',{k:'catalog_ver',v:1});
}
// Kỳ báo cáo REALTIME: mỗi lần mở app tự tạo đủ 12 tháng gần nhất đến ĐÚNG tháng hiện tại (không tạo kỳ tương lai)
async function ensurePeriods(){
  const now=new Date();
  for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const id='M'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    let ex=null; try{ex=await dbGet('periods',id);}catch(e){}
    if(!ex) await dbPut('periods',{id,type:'month',label:'Tháng '+(d.getMonth()+1)+'/'+d.getFullYear(),
      year:d.getFullYear(),month:d.getMonth()+1,locked:false});
  }
}
function currentPeriodId(){const n=new Date();return 'M'+n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}

/* ================== KPI ENGINE ================== */
/* KPI_đầu_việc = A(0-25)+B(0-20)+C(0-25)+D(0-20)+E(0-10) – P  */
function num(v){const n=parseFloat(v);return isNaN(n)?0:n;}
function getMetric(catalog,metrics,role){
  const def=catalog.metrics.find(x=>x.role===role); if(!def)return null;
  const found=metrics.find(x=>x.code===def.code);
  return (found&&found.value!==''&&found.value!=null)?found.value:null;
}
/* ================== KPI ENGINE — THANG 1000 ĐIỂM, TỰ ĐỘNG (Rule 1-7) ================== */
const DEFAULT_KPI_CFG={
  scaleMax:1000,
  formulaMode:'linear',            // 'linear' (Rule 1) | 'range' (Rule 3)
  rangeRule:[[100,1000],[99,990],[98,980],[97,970],[96,960],[95,950],[90,900],[85,850],[80,800],[75,750],[70,700],[60,600],[50,500],[40,400],[30,300],[20,200],[10,100],[0,0]],
  errorMode:'table',               // Rule 2: 'table' | 'per_error'
  pointsPerError:20,
  errorTable:[[1,980],[2,950],[5,800],[10,500],[20,0]],   // [số lỗi, điểm trần]
  blockedPenalty:20,               // Rule 7: mỗi hồ sơ/case treo
  latePenalty:100,                 // trễ hạn
  returnedPenalty:80,              // báo cáo bị trả sửa
  noEvidencePenalty:50,            // thiếu minh chứng bắt buộc
  grades:[[950,'Xuất sắc'],[900,'Tốt'],[800,'Khá'],[700,'Đạt'],[600,'Cần cải thiện'],[0,'Không đạt']],
};
let KPI_CFG=JSON.parse(JSON.stringify(DEFAULT_KPI_CFG));
async function loadKpiCfg(){ try{const r=await dbGet('meta','kpi_cfg'); if(r&&r.v)KPI_CFG={...JSON.parse(JSON.stringify(DEFAULT_KPI_CFG)),...r.v};}catch(e){} }
async function saveKpiCfg(){ await dbPut('meta',{k:'kpi_cfg',v:KPI_CFG}); }

function rangeScore(pct){ // Rule 3: tra bảng khoảng (đã sắp giảm dần theo %)
  const tbl=[...(KPI_CFG.rangeRule||[])].sort((a,b)=>b[0]-a[0]);
  for(const [minPct,score] of tbl){ if(pct>=minPct) return score; }
  return 0;
}
function errorDeduct(errCount){ // Rule 2: trả về số điểm bị TRỪ do lỗi
  if(errCount<=0)return 0;
  if(KPI_CFG.errorMode==='per_error') return errCount*num(KPI_CFG.pointsPerError);
  const tbl=[...(KPI_CFG.errorTable||[])].sort((a,b)=>a[0]-b[0]);
  let cap=0; for(const [cnt,score] of tbl){ if(errCount>=cnt) cap=1000-score; }
  return cap;
}
// Tự động chấm KPI 1 đầu việc — KHÔNG nhập tay. Target/Actual lấy từ chỉ tiêu nghiệp vụ.
function computeLineKPI(catalog, line, actual, metrics){
  const reasons=[]; const deducts=[];
  const completion = actual ? num(actual.completionPct) : 0;
  // --- Target & Actual (Rule 1: càng lớn càng tốt) ---
  let target=null, actualV=null, srcLabel='';
  const vplan=getMetric(catalog,metrics,'vplan'), vact=getMetric(catalog,metrics,'vactual');
  const valplan=getMetric(catalog,metrics,'valplan'), valact=getMetric(catalog,metrics,'valactual');
  if(vplan!=null&&num(vplan)>0&&vact!=null){target=num(vplan);actualV=num(vact);srcLabel='khối lượng';}
  else if(valplan!=null&&num(valplan)>0&&valact!=null){target=num(valplan);actualV=num(valact);srcLabel='giá trị';}
  else {target=100;actualV=completion;srcLabel='% hoàn thành';}
  const pct = target>0 ? (actualV/target)*100 : 0;
  // --- Điểm gốc: Rule 1 (tuyến tính, trần 1000) hoặc Rule 3 (bảng khoảng) ---
  let base;
  if(KPI_CFG.formulaMode==='range'){ base=rangeScore(pct); reasons.push(`Đạt ${pct.toFixed(1)}% target (${srcLabel}: ${fmtNum(actualV)}/${fmtNum(target)}) → tra bảng khoảng: ${base} điểm`); }
  else { base=Math.min(Math.round(pct/100*1000),1000); reasons.push(`Đạt ${pct.toFixed(1)}% target (${srcLabel}: ${fmtNum(actualV)}/${fmtNum(target)}) → MIN(${pct.toFixed(0)}%×1000, 1000) = ${base} điểm`); }
  // --- Rule 2: lỗi/sai sót/trả lại (càng nhỏ càng tốt, target = 0) ---
  let errTotal=0;
  catalog.metrics.filter(x=>x.role==='err'||x.role==='reject').forEach(def=>{
    const mv=metrics.find(x=>x.code===def.code); if(mv)errTotal+=num(mv.value);});
  if(errTotal>0){const dv=errorDeduct(errTotal); deducts.push(['Lỗi/sai sót ('+errTotal+')',dv]); reasons.push(`Rule lỗi: ${errTotal} lỗi → trừ ${dv} điểm`);}
  else reasons.push('Không có lỗi/sai sót → không trừ');
  // --- Rule 7: các khoản phạt (điểm không âm) ---
  const lateFlag=getMetric(catalog,metrics,'late');
  const ontimeDate=getMetric(catalog,metrics,'ontime_date'), dueDate=line.deadline||getMetric(catalog,metrics,'due_date');
  let isLate=false;
  if(lateFlag==='true'||lateFlag===true||num(lateFlag)===1)isLate=true;
  else if(ontimeDate&&dueDate&&new Date(ontimeDate)>new Date(dueDate))isLate=true;
  else if(actual&&actual.actualEndDate&&line.deadline&&new Date(actual.actualEndDate)>new Date(line.deadline))isLate=true;
  if(isLate){deducts.push(['Trễ hạn',num(KPI_CFG.latePenalty)]); reasons.push(`Trễ hạn → trừ ${KPI_CFG.latePenalty} điểm`);}
  let blocked=0; catalog.metrics.filter(x=>x.role==='blocked').forEach(def=>{const mv=metrics.find(x=>x.code===def.code);if(mv)blocked+=num(mv.value);});
  if(blocked>0){const dv=Math.min(300,blocked*num(KPI_CFG.blockedPenalty)); deducts.push(['Hồ sơ treo ('+blocked+')',dv]); reasons.push(`Treo/tồn đọng: ${blocked} → trừ ${dv} điểm`);}
  if(actual&&actual.status==='returned'){deducts.push(['Bị trả sửa',num(KPI_CFG.returnedPenalty)]); reasons.push(`Báo cáo bị trả sửa → trừ ${KPI_CFG.returnedPenalty} điểm`);}
  if(catalog.evidence&&!(actual&&actual.hasEvidence)&&completion>0){deducts.push(['Thiếu minh chứng',num(KPI_CFG.noEvidencePenalty)]); reasons.push(`Thiếu minh chứng bắt buộc → trừ ${KPI_CFG.noEvidencePenalty} điểm`);}
  const deductTotal=deducts.reduce((s,[,v])=>s+v,0);
  const final=Math.max(0,Math.min(1000,Math.round(base-deductTotal)));  // 0 ≤ điểm ≤ 1000
  return {final, grade:kpiGrade(final), pct:+pct.toFixed(1), target, actualV, srcLabel,
    base, deducts, deductTotal, reasons};
}
function kpiGrade(s){ const g=[...(KPI_CFG.grades||DEFAULT_KPI_CFG.grades)].sort((a,b)=>b[0]-a[0]);
  for(const [min,label] of g){ if(s>=min) return label; } return g[g.length-1][1]; }
function gradeBadge(s){ if(s>=900)return'g'; if(s>=800)return'g'; if(s>=700)return'b'; if(s>=600)return'a'; return'r';}

function timeAgo(iso){const s=Math.floor((Date.now()-new Date(iso).getTime())/1000);if(s<60)return'vừa xong';if(s<3600)return Math.floor(s/60)+' phút trước';if(s<86400)return Math.floor(s/3600)+' giờ trước';return Math.floor(s/86400)+' ngày trước';}
function statusPill(d){
  if(d.overdue)return '<span class="pill over">Quá hạn</span>';
  const st=d.actual?d.actual.status:'not_started';
  const soon=d.line&&d.line.deadline&&!d.overdue&&((new Date(d.line.deadline)-Date.now())/86400000<=3)&&st!=='approved'&&st!=='done';
  if(st==='approved'||st==='done')return '<span class="pill done">Hoàn thành</span>';
  if(st==='returned')return '<span class="pill over">Bị trả sửa</span>';
  if(soon)return '<span class="pill soon">Sắp đến hạn</span>';
  if(st==='submitted')return '<span class="pill wait">Chờ duyệt</span>';
  if(st==='in_progress')return '<span class="pill doing">Đang thực hiện</span>';
  if(st==='not_started')return '<span class="pill wait">Chờ thực hiện</span>';
  return '<span class="pill draft">'+(STATUS_LABELS[st]||st)+'</span>';
}

/* ================== DATA ACCESS: OKR ================== */
async function getOrCreateOKR(empCode, periodId){
  const all=await dbIndex('okr_headers','emp',empCode);
  let h=all.find(x=>x.periodId===periodId);
  if(!h){const emp=await dbGet('employees',empCode);
    h={id:uid('okr'),empCode,empName:emp.name,branch:emp.branch,periodId,
       title:'OKR '+periodId,objective:'',status:'draft',totalScore:null,locked:false,
       managerComment:'',createdAt:new Date().toISOString()};
    await dbPut('okr_headers',h);}
  return h;
}
async function getLines(okrId){return (await dbIndex('okr_lines','okr',okrId)).sort((a,b)=>(a.order||0)-(b.order||0));}
async function getLineActual(lineId){const a=await dbIndex('okr_line_actuals','line',lineId);return a[0]||null;}
async function getLineMetrics(lineId){return await dbIndex('okr_metrics','line',lineId);}

async function totalWeight(okrId){const ls=await getLines(okrId);return ls.reduce((s,l)=>s+num(l.weight),0);}

  main.innerHTML=`
  <div class="page-head"><div>
    <h1>Kế hoạch OKR — ${esc(period.label)}</h1>
    <div class="sub">${esc(STATE.user.name)} · ${esc(STATE.user.branchName)} · Trạng thái: ${stBadge(h.status)}</div>

    <div class="kpi-tile b-blue"><div class="k-bar"></div><div class="k-label">Số đầu việc</div><div class="k-val">${lines.length}</div></div>

async function saveOKRHeader(id){const h=await dbGet('okr_headers',id);h.title=$('#okr-title').value;h.objective=$('#okr-obj').value;await dbPut('okr_headers',h);await audit('okr',id,'update','header');toast('Đã lưu header OKR','ok');}
async function submitOKR(id){const tw=await totalWeight(id);if(tw!==100){toast('Tổng trọng số phải = 100% (hiện '+tw+'%)','err');return;}const h=await dbGet('okr_headers',id);h.status='submitted';h.submitDate=new Date().toISOString();await dbPut('okr_headers',h);await audit('okr',id,'submit');toast('Đã gửi duyệt OKR','ok');routeRender();}
async function copyPrevOKR(id){
  const h=await dbGet('okr_headers',id); const periods=await dbAll('periods');
  const idx=periods.findIndex(p=>p.id===h.periodId); if(idx<=0){toast('Không có kỳ trước','warn');return;}
  const prev=periods[idx-1]; const prevH=(await dbIndex('okr_headers','emp',h.empCode)).find(x=>x.periodId===prev.id);
  if(!prevH){toast('Kỳ trước chưa có OKR','warn');return;}
  const prevLines=await getLines(prevH.id); let n=0;
  for(const pl of prevLines){await dbPut('okr_lines',{...pl,id:uid('line'),okrId:id});n++;}
  await audit('okr',id,'copy_prev',null,null,n+' đầu việc'); toast(`Đã copy ${n} đầu việc từ ${prev.label}`,'ok'); routeRender();
}
async function delLine(okrId,lineId){if(!confirm('Xóa đầu việc này?'))return;await dbDel('okr_lines',lineId);const ms=await getLineMetrics(lineId);for(const x of ms)await dbDel('okr_metrics',x.id);const a=await getLineActual(lineId);if(a)await dbDel('okr_line_actuals',a.id);await audit('okr_line',lineId,'delete');toast('Đã xóa','ok');routeRender();}

function captureEditorDom(){ // thu hoạch mọi giá trị đang nhập trước khi tab bị render lại
  const l=window._line, cat=_editCtx&&_editCtx.cat, a=window._actual||{};
  if(!l||!cat)return;
  const rd=id=>{const e=document.getElementById(id);return e?e.value:undefined;};
  if(rd('l-obj')!==undefined){l.objective=rd('l-obj');l.expectedResult=rd('l-exp');l.deadline=rd('l-deadline');
    l.priority=rd('l-priority');l.weight=num(rd('l-weight'));l.planNote=rd('l-note');}
  cat.metrics.forEach(mt=>{const e=document.getElementById('m-'+mt.code);if(e)window._mMap[mt.code]=e.value;});
  if(rd('a-status')!==undefined){a.status=rd('a-status');a.completionPct=rd('a-pct');a.actualStartDate=rd('a-start');
    a.actualEndDate=rd('a-end');a.actualQty=rd('a-qty');a.actualValue=rd('a-value');a.actualResult=rd('a-result');a.riskNote=rd('a-risk');}
  if(rd('a-evlink')!==undefined){a.evidenceLink=rd('a-evlink');a.hasEvidence=rd('a-hasev')==='true';}
  window._actual=a;
}
function switchTab(t){captureEditorDom();_editCtx.tab=t;document.querySelectorAll('#line-tabs .tab').forEach(x=>x.classList.toggle('active',x.dataset.t===t));renderTab(t);}
function fInput(id,label,val,type,opts={}){
  const dis=_editCtx.locked?'disabled':'';
  let inp;
  if(type==='text'&&opts.area)inp=`<textarea id="${id}" ${dis}>${esc(val||'')}</textarea>`;
  else if(type==='bool')inp=`<select id="${id}" ${dis}><option value="">--</option><option value="true" ${val==='true'||val===true?'selected':''}>Có</option><option value="false" ${val==='false'||val===false?'selected':''}>Không</option></select>`;
  else if(type==='date')inp=`<input id="${id}" type="date" value="${esc(val||'')}" ${dis}>`;
  else if(opts.select)inp=`<select id="${id}" ${dis}>${opts.select.map(o=>`<option ${o===val?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
  else if(type==='money'||type==='number'||type==='int'||type==='pct')inp=`<input id="${id}" type="number" step="any" value="${esc(val??'')}" ${dis}>`;
  else inp=`<input id="${id}" value="${esc(val||'')}" ${dis}>`;
  return `<div class="field"><label>${esc(label)}${opts.req?' <span class="req">*</span>':''}${opts.unit?` <span style="color:var(--c-text2);font-weight:400">(${esc(opts.unit)})</span>`:''}</label>${inp}${opts.hint?`<div class="hint">${esc(opts.hint)}</div>`:''}</div>`;
}

async function saveLine(){
  captureEditorDom();  // thu hoạch giá trị của MỌI tab đã nhập (kế hoạch/thực hiện/chỉ tiêu/minh chứng)
  const l=window._line; const cat=_editCtx.cat; const a=window._actual||{};
  await dbPut('okr_lines',l);
  const mMap=window._mMap;
  for(const mt of cat.metrics){ if(mMap[mt.code]!==undefined && mMap[mt.code]!==''){
    const existing=(await getLineMetrics(l.id)).find(x=>x.code===mt.code);
    await dbPut('okr_metrics',{id:existing?existing.id:uid('mt'),lineId:l.id,code:mt.code,value:mMap[mt.code]});
  }}
  const exA=await getLineActual(l.id);
  if(a.status||a.completionPct||a.actualResult||a.evidenceLink){
    a.id=exA?exA.id:uid('act'); a.lineId=l.id; a.submittedBy=STATE.user.empCode; a.submittedAt=new Date().toISOString();
    await dbPut('okr_line_actuals',a); window._actual=a;
  }
  // ⚙ KPI ENGINE TỰ ĐỘNG: Lưu → chấm điểm → lưu DB → cập nhật Dashboard/AI → báo quản lý (không nhập tay)
  const mArrAuto=cat.metrics.map(mt=>({code:mt.code,value:mMap[mt.code]}));
  const kAuto=computeLineKPI(cat,l,window._actual,mArrAuto);
  await dbPut('kpi_results',{id:'kpil_'+l.id,lineId:l.id,okrId:l.okrId,empCode:STATE.user.empCode,
    branch:STATE.user.branch,periodId:STATE.periodId,scope:'line',target:kAuto.target,actual:kAuto.actualV,
    pct:kAuto.pct,base:kAuto.base,deduct:kAuto.deductTotal,weight:num(l.weight),
    finalScore:kAuto.final,converted:Math.round(kAuto.final*num(l.weight)/100),grade:kAuto.grade,calcAt:new Date().toISOString()});
  await audit('kpi',l.id,'auto_score','',null,kAuto.final+' điểm ('+kAuto.grade+')');
  await audit('okr_line',l.id,'save');
  toast(`Đã lưu · KPI tự động: ${kAuto.final}/1000 (${kAuto.grade})`,'ok');
  closeModal(); routeRender();
}

async function viewActual(main){
  if(!STATE.user.empCode){main.innerHTML=noPersonalMsg('Công việc của tôi');return;}
  const h=await getOrCreateOKR(STATE.user.empCode,STATE.periodId);
  const lines=await getLines(h.id); const period=await dbGet('periods',STATE.periodId);
  const groups=await dbAll('work_groups');
  const gname=c=>{const g=groups.find(x=>x.code===c);return g?g.name:c;};
  const rows=[];
  for(const l of lines){const a=await getLineActual(l.id);const cat=await dbGet('work_catalog',l.workCode);
    const pct=a?num(a.completionPct):0;
    const overdue=l.deadline&&a&&a.status!=='approved'&&new Date(l.deadline)<new Date()&&!a.actualEndDate || (l.deadline&&!a&&new Date(l.deadline)<new Date());
    const st=a?a.status:'not_started';
    const prio=l.priority||(num(l.weight)>=20?'Cao':num(l.weight)>=10?'TB':'Thấp');
    rows.push({l,a,cat,pct,overdue:!!overdue,st,prio,group:cat?cat.group:'',d:{line:l,actual:a,cat,overdue:!!overdue}});}
  const isDone=r=>r.st==='done'||r.st==='approved';
  const isDoing=r=>!r.overdue&&(r.st==='in_progress'||r.st==='submitted');
  const isWait=r=>!r.overdue&&(r.st==='not_started'||r.st==='draft'||!r.a);
  const cnt={all:rows.length,doing:rows.filter(isDoing).length,wait:rows.filter(isWait).length,done:rows.filter(isDone).length,over:rows.filter(r=>r.overdue).length};
  const tab=window._actualTab||'all';
  const shown=rows.filter(r=>tab==='all'||(tab==='doing'&&isDoing(r))||(tab==='wait'&&isWait(r))||(tab==='done'&&isDone(r))||(tab==='over'&&r.overdue));
  const tabBtn=(k,l)=>`<div class="tab ${tab===k?'active':''}" onclick="setActualTab('${k}')">${l}<span class="ct">${cnt[k]}</span></div>`;
  let body='';
  shown.forEach((r,i)=>{
    body+=`<tr><td>${i+1}</td>
      <td><b style="color:var(--c-primary)">${esc(r.cat.name)}</b> ${r.prio==='Cao'?'<span style="color:#f5b50a">★</span>':''}<div style="font-size:11px;color:var(--c-text2)">${esc(r.l.workCode)}</div></td>
      <td>${esc(gname(r.group))}</td>
      <td style="${r.overdue?'color:var(--c-red);font-weight:600':''}">${fmtDate(r.l.deadline)}</td>
      <td>${statusPill(r.d)}</td>
      <td>${prioTag(r.prio)}</td>
      <td>${progressBar(r.pct)}</td>
      <td><span class="av-sm">${esc(avInitials(STATE.user.name))}</span>${esc(STATE.user.name.split(' ').slice(-1)[0])}</td>
      <td style="text-align:right"><button class="btn ghost sm" onclick="editLine('${h.id}','${r.l.id}')">Cập nhật</button></td></tr>`;});
  main.innerHTML=`<div class="page-head"><div><h1>Công việc của tôi</h1>
    <div class="sub">Cập nhật báo cáo thực hiện · chỉ tiêu nghiệp vụ · minh chứng — ${esc(period.label)}</div></div></div>
    <div class="tabs counts">${tabBtn('all','Tất cả')}${tabBtn('doing','Đang thực hiện')}${tabBtn('wait','Chờ thực hiện')}${tabBtn('done','Hoàn thành')}${tabBtn('over','Quá hạn')}</div>
    <div class="toolbar"><div class="grow"></div>
      <button class="btn neutral sm" onclick="toast('Bộ lọc — demo')">⛃ Bộ lọc</button>
      <button class="btn neutral sm" onclick="toast('Sắp xếp — demo')">↕ Sắp xếp</button>
      <button class="btn sm" onclick="addLine('${h.id}')">＋ Thêm đầu việc</button></div>
    <div class="card soft"><div class="card-b" style="padding:0">
    ${shown.length?`<table class="grid"><thead><tr><th>STT</th><th>Tên công việc</th><th>Nhóm</th><th>Kỳ hạn</th><th>Trạng thái</th><th>Ưu tiên</th><th>Tiến độ</th><th>Người thực hiện</th><th></th></tr></thead><tbody>${body}</tbody></table>`
      :'<div class="empty"><div class="e-ic">📝</div>'+(rows.length?'Không có công việc trong mục này.':'Chưa có đầu việc. Hãy lập kế hoạch OKR hoặc bấm “Thêm đầu việc”.')+'</div>'}
    </div></div>`;
}

      <td>${stBadge(h.status)}</td>

  main.innerHTML=`<div class="page-head"><div><h1>Phê duyệt – Trả sửa – Khóa kỳ</h1>
    <div class="sub">Duyệt OKR & actual, nhận xét từng đầu việc, chấm điểm bổ sung, khóa/mở kỳ.</div></div></div>
    <div class="card"><div class="card-h">OKR trong kỳ thuộc phạm vi quản lý (${headers.length})</div><div class="card-b" style="padding:0">
    ${headers.length?`<table class="grid"><thead><tr><th>Nhân viên</th><th>Số đầu việc</th><th>Hoàn thành</th><th>Trạng thái</th><th></th></tr></thead><tbody>${rows}</tbody></table>`
      :'<div class="empty"><div class="e-ic">✓</div>Chưa có OKR nào trong kỳ.</div>'}</div></div>`;
}
async function reviewOKR(okrId){
  const h=await dbGet('okr_headers',okrId); const lines=await getLines(okrId);
  let rows='';
  for(const l of lines){const cat=await dbGet('work_catalog',l.workCode);const a=await getLineActual(l.id);
    const metricsArr=(await getLineMetrics(l.id)).map(x=>({code:x.code,value:x.value}));
    const k=computeLineKPI(cat,l,a,metricsArr);
    rows+=`<tr><td>${esc(cat.name)}</td><td class="num">${l.weight}%</td><td>${a?stBadge(a.status):'—'}</td>
      <td class="num"><span class="badge ${gradeBadge(k.final)}">${k.final}</span></td>
      <td style="text-align:right">${a&&a.status==='done'?`<button class="btn ghost sm" onclick="approveActual('${okrId}','${l.id}','approve')">Duyệt</button>
        <button class="btn danger sm" onclick="approveActual('${okrId}','${l.id}','return')">Trả sửa</button>`:'<span style="font-size:11px;color:var(--c-text2)">Chưa nộp</span>'}</td></tr>`;}
  const okrScore=await calcOKRScore(okrId);
  openModal('Xem xét OKR — '+esc(h.empName),`
    <div class="kpi-grid" style="margin-bottom:14px">
      <div class="kpi-tile b-blue"><div class="k-bar"></div><div class="k-label">Số đầu việc</div><div class="k-val">${lines.length}</div></div>
      <div class="kpi-tile b-green"><div class="k-bar"></div><div class="k-label">KPI OKR (theo trọng số)</div><div class="k-val">${okrScore}</div><div class="k-sub">${kpiGrade(okrScore)}</div></div>
    </div>
    <table class="grid"><thead><tr><th>Công việc</th><th>Trọng số</th><th>Actual</th><th>KPI</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    <div class="field" style="margin-top:16px"><label>Nhận xét quản lý cho OKR</label><textarea id="mgr-comment">${esc(h.managerComment||'')}</textarea></div>`,
    `<button class="btn neutral" onclick="closeModal()">Đóng</button>
     ${h.status==='submitted'?`<button class="btn" onclick="approveOKRPlan('${okrId}')">Duyệt kế hoạch OKR</button>`:''}
     <button class="btn ghost" onclick="saveMgrComment('${okrId}')">Lưu nhận xét</button>
     ${h.locked?`<button class="btn neutral" onclick="lockPeriodOKR('${okrId}',false)">Mở khóa</button>`:`<button class="btn neutral" onclick="lockPeriodOKR('${okrId}',true)">🔒 Khóa kỳ & chốt KPI</button>`}`);
}
async function calcOKRScore(okrId){
  const lines=await getLines(okrId); let tw=0,acc=0;
  for(const l of lines){const cat=await dbGet('work_catalog',l.workCode);const a=await getLineActual(l.id);
    const metricsArr=(await getLineMetrics(l.id)).map(x=>({code:x.code,value:x.value}));
    const k=computeLineKPI(cat,l,a,metricsArr); const w=num(l.weight); tw+=w; acc+=k.final*w;}
  return tw>0?+(acc/tw).toFixed(1):0;
}
async function approveActual(okrId,lineId,act){
  const a=await getLineActual(lineId); if(!a)return;
  a.status= act==='approve'?'approved':'returned'; await dbPut('okr_line_actuals',a);
  await dbPut('approvals',{id:uid('apr'),objectType:'actual',objectId:lineId,status:a.status,
    approver:STATE.user.empCode,approvedAt:new Date().toISOString()});
  await audit('actual',lineId,act==='approve'?'approve':'return');
  toast(act==='approve'?'Đã duyệt actual':'Đã trả sửa','ok'); reviewOKR(okrId);
}
async function approveOKRPlan(okrId){const h=await dbGet('okr_headers',okrId);h.status='approved';h.approveDate=new Date().toISOString();h.approver=STATE.user.empCode;await dbPut('okr_headers',h);await audit('okr',okrId,'approve_plan');toast('Đã duyệt kế hoạch OKR','ok');closeModal();routeRender();}
async function saveMgrComment(okrId){const h=await dbGet('okr_headers',okrId);h.managerComment=$('#mgr-comment').value;await dbPut('okr_headers',h);await audit('okr',okrId,'comment');toast('Đã lưu nhận xét','ok');}
async function lockPeriodOKR(okrId,lock){
  const h=await dbGet('okr_headers',okrId); h.locked=lock; h.status=lock?'locked':'approved';
  if(lock){const score=await calcOKRScore(okrId); h.totalScore=score;
    await dbPut('kpi_results',{id:uid('kpi'),empCode:h.empCode,branch:h.branch,periodId:h.periodId,okrId,
      finalScore:score,grade:kpiGrade(score),calcAt:new Date().toISOString()});}
  await dbPut('okr_headers',h); await audit('okr',okrId,lock?'lock':'unlock');
  toast(lock?'Đã khóa kỳ & chốt KPI':'Đã mở khóa','ok'); closeModal(); routeRender();
}

/* ================== AGGREGATION FOR DASHBOARD/KPI ================== */
async function gatherPeriodData(periodId){
  const headers=(await dbAll('okr_headers')).filter(h=>h.periodId===periodId&&can.inScope(h.branch));
  const out=[];
  for(const h of headers){const lines=await getLines(h.id);
    for(const l of lines){const cat=await dbGet('work_catalog',l.workCode);const a=await getLineActual(l.id);
      const metrics=await getLineMetrics(l.id); const mArr=metrics.map(x=>({code:x.code,value:x.value}));
      const k=computeLineKPI(cat,l,a,mArr);
      const overdue = l.deadline && a && a.status!=='approved' && new Date(l.deadline)<new Date() && (!a.actualEndDate);
      out.push({header:h,line:l,cat,actual:a,metrics,kpi:k,overdue:!!overdue});}}
  return out;
}
function sumMetricByRole(data,role){let s=0;data.forEach(d=>{const def=d.cat.metrics.find(x=>x.role===role);if(def){const mv=d.metrics.find(x=>x.code===def.code);if(mv)s+=num(mv.value);}});return s;}

  const idx=periods.findIndex(p=>p.id===STATE.periodId);
  let prevScope=[];
  if(idx>0){const pd=await gatherPeriodData(periods[idx-1].id);prevScope=can.manage()?pd:pd.filter(d=>d.header.empCode===STATE.user.empCode);}

  const isDone=d=>d.actual&&(d.actual.status==='done'||d.actual.status==='approved');
  const isDoing=d=>!d.overdue&&d.actual&&(d.actual.status==='in_progress'||d.actual.status==='submitted');
  const isNew=d=>!d.actual||d.actual.status==='not_started'||d.actual.status==='draft';
  const total=scope.length, done=scope.filter(isDone).length, overdue=scope.filter(d=>d.overdue).length;

  const avgKpi=scope.length?+(scope.reduce((s,d)=>s+d.kpi.final,0)/scope.length).toFixed(0):0;

  const pDoing=prevScope.filter(isDoing).length;
  const pAvg=prevScope.length?prevScope.reduce((s,d)=>s+d.kpi.final,0)/prevScope.length:0;
  const pct=(cur,prev)=>{if(!prev)return null;return Math.round((cur-prev)/prev*100);};
  const trend=(v,inverse)=>{if(v===null)return '<span class="s-trend" style="color:var(--c-text2)">— kỳ trước</span>';
    const good=inverse? v<=0 : v>=0; const cls=good?'s-up':'s-down'; const arr=v>=0?'▲':'▼';
    return `<span class="s-trend ${cls}"><b>${arr} ${v>=0?'+':''}${v}%</b> so với kỳ trước</span>`;};

  main.innerHTML=`<div class="page-head"><div><h1>Tổng quan</h1>

    <div class="stat-grid">
      <div class="stat"><div class="s-top"><span class="s-label">Tổng công việc</span><span class="s-ic ic-blue">🗂️</span></div><div class="s-val">${total}</div>${trend(pct(total,pT))}</div>
      <div class="stat"><div class="s-top"><span class="s-label">Đã hoàn thành</span><span class="s-ic ic-green">✓</span></div><div class="s-val">${done}</div>${trend(pct(done,pDone))}</div>
      <div class="stat"><div class="s-top"><span class="s-label">Đang thực hiện</span><span class="s-ic ic-amber">⏳</span></div><div class="s-val">${doing}</div>${trend(pct(doing,pDoing))}</div>
      <div class="stat"><div class="s-top"><span class="s-label">Quá hạn</span><span class="s-ic ic-red">⚠️</span></div><div class="s-val">${overdue}</div>${trend(pct(overdue,pOver),true)}</div>
      <div class="stat"><div class="s-top"><span class="s-label">KPI ${can.manage()?'trung bình':'cá nhân'} (/1000)</span><span class="s-ic ic-violet">📈</span></div><div class="s-val">${avgKpi}</div>${trend(pAvg?Math.round((avgKpi-pAvg)/pAvg*100):null)}</div>
    </div>
    <div class="dash-2">
      <div class="card soft"><div class="card-h">Tiến độ công việc trong kỳ <span class="link" onclick="go('kpi')">Chi tiết</span></div>
        <div class="card-b"><div class="chart-wrap" style="height:260px"><canvas id="ch-prog"></canvas></div></div></div>
      <div class="card soft"><div class="card-h">Phân bổ công việc</div>
        <div class="card-b"><div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
          <div style="width:170px;height:170px;flex-shrink:0"><canvas id="ch-dist"></canvas></div>
          <div style="flex:1;min-width:170px">
            ${legendRow('var(--c-green)','Hoàn thành',done,total)}
            ${legendRow('var(--c-primary)','Đang thực hiện',doing,total)}
            ${legendRow('var(--c-amber)','Chưa bắt đầu',notStarted,total)}
            ${legendRow('var(--c-red)','Quá hạn',overdue,total)}
          </div></div></div></div>
    </div>
    <div class="dash-2b">
      <div class="card soft"><div class="card-h">Công việc cần xử lý <span class="link" onclick="go('actual')">Xem tất cả</span></div>
        <div class="card-b">${renderNeedList(scope)}</div></div>
      <div class="card soft"><div class="card-h">Hoạt động gần đây <span class="link" onclick="go('master')">Xem tất cả</span></div>
        <div class="card-b" id="dash-activity">Đang tải…</div></div>
    </div>
    <div class="card soft"><div class="card-h">⚠️ Cảnh báo tài chính – rủi ro</div><div class="card-b" style="padding:0">${renderRiskTable(scope)}</div></div>`;
  drawDashCharts(scope);
  renderActivity();
}
function legendRow(color,label,v,total){const p=total?Math.round(v/total*100):0;
  return `<div class="legend-row"><div class="lg-l"><span class="lg-dot" style="background:${color}"></span>${label}</div><div><span class="lg-v">${v}</span><span class="lg-pct">${p}%</span></div></div>`;}

function renderNeedList(scope){
  const items=scope.filter(d=>d.overdue||(d.actual&&d.actual.status==='submitted')||(d.line&&d.line.deadline&&((new Date(d.line.deadline)-Date.now())/86400000<=3)&&!isDoneState(d)))
    .sort((a,b)=>{const da=a.line.deadline?new Date(a.line.deadline):9e15;const db=b.line.deadline?new Date(b.line.deadline):9e15;return da-db;}).slice(0,5);
  if(!items.length)return '<div class="empty" style="padding:24px"><div class="e-ic">✓</div>Không có việc cần xử lý gấp.</div>';
  return items.map(d=>`<div class="tneed"><div><div class="tn-name">${esc(d.cat.name)}</div>
    <div class="tn-due">Kỳ hạn: <b>${fmtDate(d.line.deadline)}</b></div></div>${statusPill(d)}</div>`).join('');

function isDoneState(d){return d.actual&&(d.actual.status==='done'||d.actual.status==='approved');}

async function renderActivity(){

    lock:'đã khóa kỳ',unlock:'đã mở kỳ',submit:'đã nộp',approve:'đã duyệt',return:'đã trả sửa'};

function renderRiskTable(scope){
  const risks=[];
  scope.forEach(d=>{
    if(d.overdue)risks.push({t:'Quá hạn',w:d.cat.name,e:d.header.empName,sev:'over',note:'Hạn '+fmtDate(d.line.deadline)});
    if(d.actual&&d.actual.status==='returned')risks.push({t:'Trả sửa',w:d.cat.name,e:d.header.empName,sev:'wait',note:'Báo cáo bị trả lại'});
    const blocked=sumMetricByRole([d],'blocked');
    if(blocked>0)risks.push({t:'Treo/tồn đọng',w:d.cat.name,e:d.header.empName,sev:'wait',note:fmtNum(blocked)+' case/giá trị treo'});
    if(d.kpi.final<600)risks.push({t:'KPI thấp',w:d.cat.name,e:d.header.empName,sev:'over',note:'KPI '+d.kpi.final+' ('+d.kpi.grade+')'});
  });
  if(!risks.length)return '<div class="empty"><div class="e-ic">✓</div>Không có cảnh báo rủi ro trong kỳ.</div>';
  return `<table class="grid"><thead><tr><th>Loại rủi ro</th><th>Công việc</th><th>Nhân viên</th><th>Chi tiết</th></tr></thead><tbody>
    ${risks.slice(0,30).map(r=>`<tr><td><span class="pill ${r.sev}">${r.t}</span></td><td>${esc(r.w)}</td><td>${esc(r.e)}</td><td>${esc(r.note)}</td></tr>`).join('')}</tbody></table>`;
}

let _charts=[];
function drawDashCharts(scope){
  _charts.forEach(c=>{try{c.destroy()}catch(e){}}); _charts=[];
  const C={blue:'#0a6ed1',green:'#107e3e',amber:'#e8590c',red:'#bb0000',grey:'#c7d0da'};
  // progress line: cumulative done (by actualEndDate weekday) vs planned ramp
  const days=['T2','T3','T4','T5','T6','T7','CN'];
  const total=scope.length;
  const doneByDay=[0,0,0,0,0,0,0];
  scope.forEach(d=>{if(isDoneState(d)&&d.actual&&d.actual.actualEndDate){const wd=(new Date(d.actual.actualEndDate).getDay()+6)%7;doneByDay[wd]++;}});
  let anyDated=doneByDay.some(x=>x>0);
  const doneCum=[];let acc=0;
  if(anyDated){doneByDay.forEach(v=>{acc+=v;doneCum.push(total?Math.round(acc/total*100):0);});}
  else{const dr=scope.filter(isDoneState).length;for(let i=0;i<7;i++)doneCum.push(total?Math.round(dr/total*100*((i+1)/7)):0);}
  const planned=days.map((_,i)=>Math.round((i+1)/7*100));
  if($('#ch-prog'))_charts.push(new Chart($('#ch-prog'),{type:'line',
    data:{labels:days,datasets:[
      {label:'Hoàn thành',data:doneCum,borderColor:C.blue,backgroundColor:'rgba(10,110,209,.10)',fill:true,tension:.4,borderWidth:2.5,pointRadius:3,pointBackgroundColor:C.blue},
      {label:'Kế hoạch',data:planned,borderColor:C.grey,borderDash:[6,5],fill:false,tension:.4,borderWidth:2,pointRadius:0}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{max:100,beginAtZero:true,ticks:{callback:v=>v+'%'}}},
      plugins:{legend:{position:'top',align:'end',labels:{boxWidth:14,usePointStyle:true}}}}}));
  // distribution doughnut
  const done=scope.filter(isDoneState).length;
  const doing=scope.filter(d=>!d.overdue&&d.actual&&(d.actual.status==='in_progress'||d.actual.status==='submitted')).length;
  const ns=scope.filter(d=>!d.actual||d.actual.status==='not_started'||d.actual.status==='draft').length;
  const over=scope.filter(d=>d.overdue).length;
  if($('#ch-dist'))_charts.push(new Chart($('#ch-dist'),{type:'doughnut',
    data:{labels:['Hoàn thành','Đang thực hiện','Chưa bắt đầu','Quá hạn'],
      datasets:[{data:[done,doing,ns,over],backgroundColor:[C.green,C.blue,C.amber,C.red],borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'66%',plugins:{legend:{display:false}}}}));
}
/* ================== VIEW: KPI & BÁO CÁO ================== */
async function viewKPI(main){
  const period=await dbGet('periods',STATE.periodId);
  const data=await gatherPeriodData(STATE.periodId);
  let scope=can.manage()?data:data.filter(d=>d.header.empCode===STATE.user.empCode);
  // Lọc theo chi nhánh (dành cho admin/quản lý nhiều chi nhánh)
  const allBranches=(await dbAll('branches')).filter(b=>can.inScope(b.code));
  const bSel=window._kpiBranch||'all';
  if(bSel!=='all') scope=scope.filter(d=>d.header.branch===bSel);
  const bName=c=>{const x=allBranches.find(y=>y.code===c);return x?x.name:c;};
  const bOpt=`<option value="all" ${bSel==='all'?'selected':''}>Tất cả chi nhánh (${allBranches.length})</option>`+
    allBranches.map(b=>`<option value="${b.code}" ${bSel===b.code?'selected':''}>${esc(b.name)}</option>`).join('');
  // group by employee
  const byE={};
  scope.forEach(d=>{const e=d.header.empCode;byE[e]=byE[e]||{name:d.header.empName,branch:d.header.branch,tw:0,acc:0,lines:0,overdue:0,returned:0};
    const w=num(d.line.weight);byE[e].tw+=w;byE[e].acc+=d.kpi.final*w;byE[e].lines++;if(d.overdue)byE[e].overdue++;if(d.actual&&d.actual.status==='returned')byE[e].returned++;});
  const emps=Object.keys(byE).map(e=>{const x=byE[e];const okrScore=x.tw>0?x.acc/x.tw:0;
    const compliance=Math.max(0,1000-x.overdue*100-x.returned*80);
    const empKpi=Math.round(0.7*okrScore+0.2*compliance+0.1*800); // 10% điểm quản lý mặc định 800/1000
    return {code:e,...x,okrScore:Math.round(okrScore),compliance,empKpi};}).sort((a,b)=>b.empKpi-a.empKpi);
  let rows=emps.map((e,i)=>`<tr><td>${i+1}</td><td><b>${esc(e.name)}</b></td><td>${esc(bName(e.branch))}</td><td class="num">${e.lines}</td>
    <td class="num">${e.okrScore}</td><td class="num">${e.compliance}</td><td class="num"><b>${e.empKpi}</b></td>
    <td><span class="badge ${gradeBadge(e.empKpi)}">${kpiGrade(e.empKpi)}</span></td></tr>`).join('');
  main.innerHTML=`<div class="page-head"><div><h1>KPI & Báo cáo — ${esc(period.label)}</h1>
    <div class="sub">Thang 1000 điểm · chấm hoàn toàn tự động theo Target/Actual/Weight/Rule. KPI_NV = 70%·KPI_OKR + 20%·Tuân thủ + 10%·Điểm quản lý.</div></div>
    <div style="display:flex;gap:8px;align-items:center">
      ${can.manage()&&allBranches.length>1?`<select onchange="setKpiBranch(this.value)" style="padding:8px 10px;border:1px solid var(--c-border);border-radius:8px;font-size:13px">${bOpt}</select>`:''}
      <button class="btn neutral" onclick="exportKPIExcel()">⬇ Export Excel</button></div></div>
    <div class="card"><div class="card-h">Bảng KPI nhân viên (${emps.length})${bSel!=='all'?' — '+esc(bName(bSel)):''} — /1000 điểm</div><div class="card-b" style="padding:0">
    ${emps.length?`<table class="grid"><thead><tr><th>#</th><th>Nhân viên</th><th>Chi nhánh</th><th>Số đầu việc</th><th>KPI OKR</th><th>Tuân thủ</th><th>KPI cuối</th><th>Xếp loại</th></tr></thead><tbody>${rows}</tbody></table>`
      :'<div class="empty"><div class="e-ic">★</div>Chưa có dữ liệu KPI trong kỳ'+(bSel!=='all'?' cho chi nhánh này':'')+'.</div>'}</div></div>`;
  window._kpiExport=emps; window._kpiData=scope;
}
function setKpiBranch(v){window._kpiBranch=v;viewKPI($('#main'));}
function exportKPIExcel(){

async function buildFactTable(periodId){
  const data=await gatherPeriodData(periodId);
  return data.map(d=>{
    const f={periodId,branch:d.header.branch,empCode:d.header.empCode,empName:d.header.empName,
      group:d.cat.group,workCode:d.cat.code,workName:d.cat.name,okrId:d.header.id,lineId:d.line.id,
      weight:num(d.line.weight),completionPct:d.actual?num(d.actual.completionPct):0,
      overdueFlag:d.overdue?1:0,approvalStatus:d.actual?d.actual.status:'not_started',
      kpiFinal:d.kpi.final,grade:d.kpi.grade,riskFlags:[]};
    f.totalFinancialValue=sumMetricByRole([d],'valactual');
    f.blockedValue=sumMetricByRole([d],'blocked');
    if(d.overdue)f.riskFlags.push('OVERDUE');
    if(d.actual&&d.actual.status==='returned')f.riskFlags.push('RETURNED');
    if(f.blockedValue>0)f.riskFlags.push('BLOCKED');
    if(d.kpi.final<600)f.riskFlags.push('LOW_KPI');
    // ai metrics
    d.cat.metrics.filter(x=>x.ai).forEach(mt=>{const mv=d.metrics.find(x=>x.code===mt.code);if(mv)f['m_'+mt.code]=mv.value;});
    return f;
  });
}

async function runAI(type){
  const out=$('#ai-out'); out.innerHTML='<div class="ai-msg">⏳ AI đang phân tích dữ liệu kỳ…</div>';
  const fact=window._fact||[];
  const compact=fact.map(f=>({nv:f.empName,nhom:f.group,viec:f.workName,kpi:f.kpiFinal,ht:f.completionPct,quahan:f.overdueFlag,trangthai:f.approvalStatus,giatri:f.totalFinancialValue,treo:f.blockedValue,co:f.riskFlags}));
  const prompt=`Bạn là chuyên gia phân tích kế toán quản trị. Dưới đây là fact table hiệu suất công việc Phòng Kế toán kỳ ${STATE.periodId} (JSON).
${AI_PROMPTS[type]}
Hãy viết báo cáo ngắn gọn bằng tiếng Việt: (1) 3-5 nhận định chính có số liệu, (2) cảnh báo cụ thể theo người/nhóm việc, (3) 2-3 khuyến nghị hành động. Dùng gạch đầu dòng, không markdown heading.
DỮ LIỆU: ${JSON.stringify(compact).slice(0,9000)}`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const d=await resp.json();
    const text=(d.content||[]).map(i=>i.type==='text'?i.text:'').join('\n').trim();
    out.innerHTML=`<div class="ai-msg u" style="font-weight:600">${esc(AI_PROMPTS[type])}</div><div class="ai-msg">${esc(text||'(Không có phản hồi)')}</div>`;
  }catch(err){
    out.innerHTML=`<div class="ai-msg" style="background:var(--c-amber-bg)">⚠ Không gọi được AI trong môi trường này (${esc(err.message)}).<br>Tính năng AI hoạt động khi chạy trong Artifact của Claude. Dưới đây là phân tích quy tắc cục bộ:</div>`+localAnalysis(type,fact);
  }
}
function localAnalysis(type,fact){
  let lines=[];
  if(type==='risk'){const r=fact.filter(f=>f.riskFlags.length).sort((a,b)=>a.kpiFinal-b.kpiFinal);
    lines.push('Top việc rủi ro: '+(r.slice(0,5).map(f=>`${f.workName} (${f.empName}, KPI ${f.kpiFinal})`).join('; ')||'không có'));
    const ret=fact.filter(f=>f.riskFlags.includes('RETURNED'));lines.push('Việc bị trả sửa: '+ret.length);}
  else if(type==='cashflow'){lines.push('Tổng giá trị xử lý: '+fmtMoney(fact.reduce((s,f)=>s+(f.totalFinancialValue||0),0))+' VNĐ');
    lines.push('Giá trị treo/tồn đọng: '+fmtMoney(fact.reduce((s,f)=>s+(f.blockedValue||0),0))+' VNĐ');}
  else if(type==='performance'){const byE={};fact.forEach(f=>{byE[f.empName]=byE[f.empName]||{s:0,n:0};byE[f.empName].s+=f.kpiFinal;byE[f.empName].n++;});
    Object.keys(byE).forEach(e=>lines.push(`${e}: KPI TB ${(byE[e].s/byE[e].n).toFixed(1)}`));}
  else {const byG={};fact.forEach(f=>{byG[f.group]=(byG[f.group]||0)+(f.overdueFlag||0)+f.riskFlags.length;});
    Object.keys(byG).sort((a,b)=>byG[b]-byG[a]).forEach(g=>lines.push(`Nhóm ${g}: ${byG[g]} điểm nghẽn/rủi ro`));}
  return `<div class="ai-msg">${lines.map(l=>'• '+esc(l)).join('<br>')}</div>`;
}

function parsePairs(txt,numLabel){return String(txt||'').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{const i=l.indexOf(':');const a=parseFloat(l.slice(0,i));const b=l.slice(i+1).trim();return [a, numLabel?parseFloat(b):b];}).filter(([a,b])=>!isNaN(a)&&(numLabel?!isNaN(b):b!==''));}

  const isAdmin=can.admin();const myScope=STATE.user.scope||[];const myBranch=STATE.user.branch||myScope[0]||'';
  const passIn=($('#ac-pass').value||'').trim();
  if(!user && !passIn)return toast('Nhập mật khẩu cho tài khoản mới','err');
  const pass = passIn || (existing?existing.pass:'') || '';
  const type=isAdmin&&$('#ac-type')?$('#ac-type').value:(existing?existing.type:'employee')||'employee';
  let rec={id:userV,user:userV,pass};
  if(type==='branch'){
    const branch=$('#ac-branch').value; const b=await dbGet('branches',branch);
    rec.type='branch';rec.role='manager';rec.empCode=null;rec.branch=branch;
    rec.display='Kế toán '+(b?b.name:branch);rec.scope=[branch];
  } else {
    const empCode=$('#ac-emp').value; if(!empCode)return toast('Chọn nhân viên (thêm nhân viên trước nếu chưa có)','err');
    const e=await dbGet('employees',empCode);
    if(!isAdmin && !myScope.includes(e.branch))return toast('Nhân viên không thuộc chi nhánh của bạn','err');
    rec.type='employee';rec.role='employee';rec.empCode=empCode;rec.branch=e.branch;
    rec.display=e.name;rec.scope=[e.branch];
  }
  await dbPut('accounts',rec);
  await audit('account',userV,user?'update':'create','',null,rec.role+(rec.empCode?'/'+rec.empCode:'/'+(rec.branch||'')));
  closeModal();toast(user?'Đã cập nhật tài khoản':'Đã thêm tài khoản','ok');renderMTab();
}
async function delAccount(user){
  if(STATE.user&&STATE.user.user===user)return toast('Không thể xóa tài khoản đang đăng nhập','err');
  const a=await dbGet('accounts',user); if(!a)return;
  if(!can.admin()){ const myScope=STATE.user.scope||[];
    if(a.type!=='employee'||!myScope.includes(a.branch))return toast('Bạn chỉ được xóa tài khoản nhân viên trong chi nhánh của mình','err');}
  if(!confirm('Xóa tài khoản "'+user+'"?'))return;
  await dbDel('accounts',user);await audit('account',user,'delete');toast('Đã xóa tài khoản','ok');renderMTab();
}

(async function boot(){
  try{ await openDB(); await seedIfEmpty(); await loadKpiCfg(); await renderLogin(); }
  catch(e){ document.getElementById('app').innerHTML='<div class="empty"><div class="e-ic">⚠</div>Không khởi tạo được CSDL: '+esc(e.message)+'</div>'; }
})();
</script>
